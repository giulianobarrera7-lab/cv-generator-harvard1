<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Generator Harvard | ATS-Friendly</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.2em;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .input-panel, .preview-panel {
            padding: 30px;
        }

        .input-panel {
            background: #f8f9fa;
            overflow-y: auto;
            max-height: 85vh;
        }

        .preview-panel {
            background: white;
            overflow-y: auto;
            max-height: 85vh;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            padding: 10px 15px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-btn:hover {
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-primary, .btn-secondary, .btn-add, .btn-coach-help {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            margin: 10px 5px 10px 0;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-add {
            background: #10b981;
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .btn-add:hover {
            background: #059669;
        }

        .btn-coach-help {
            background: #f59e0b;
            color: white;
            width: 100%;
        }

        .btn-coach-help:hover {
            background: #d97706;
        }

        .coach-panel {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 8px;
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }

        .coach-tip {
            background: white;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin: 10px 0;
            border-radius: 4px;
        }

        .coach-tip h4 {
            color: #d97706;
            margin-bottom: 10px;
        }

        .coach-tip p, .coach-tip li {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .coach-tip ul {
            margin-left: 20px;
        }

        .coach-tip .example {
            background: #f0f0f0;
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
            font-style: italic;
            font-size: 13px;
        }

        .preview-controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .cv-preview {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 40px;
            font-size: 14px;
        }

        .cv-container {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
        }

        .cv-header {
            text-align: center;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .cv-header h1 {
            font-size: 28px;
            margin: 0 0 10px 0;
            color: #1a202c;
        }

        .cv-contact {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 12px;
            color: #666;
        }

        .cv-section {
            margin-bottom: 20px;
        }

        .cv-section h3 {
            font-size: 13px;
            font-weight: bold;
            color: #1a202c;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 8px;
            margin-bottom: 12px;
        }

        .cv-item {
            margin-bottom: 15px;
        }

        .cv-title {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-size: 13px;
        }

        .cv-date {
            color: #667eea;
            font-size: 12px;
            font-weight: normal;
        }

        .cv-company {
            font-style: italic;
            color: #555;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .cv-description {
            font-size: 12px;
            line-height: 1.5;
            color: #555;
            white-space: pre-wrap;
        }

        .skills-list {
            font-size: 13px;
            color: #555;
            line-height: 1.8;
        }

        .experience-item, .education-item {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        h3 {
            margin-top: 20px;
            margin-bottom: 15px;
            color: #333;
        }

        @media (max-width: 1200px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        @media print {
            body {
                background: white;
            }
            .preview-controls {
                display: none;
            }
            .input-panel {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 CV Generator Harvard</h1>
            <p>Crea tu CV estilo Harvard, ATS-friendly con AI Coach</p>
        </header>

        <div class="main-content">
            <aside class="input-panel">
                <div class="tabs">
                    <button class="tab-btn active" data-tab="personal">Datos Personales</button>
                    <button class="tab-btn" data-tab="experience">Experiencia</button>
                    <button class="tab-btn" data-tab="education">Educación</button>
                    <button class="tab-btn" data-tab="skills">Habilidades</button>
                    <button class="tab-btn" data-tab="coach">AI Coach</button>
                </div>

                <div id="personal" class="tab-content active">
                    <h3>Información Personal</h3>
                    <input type="text" id="fullName" placeholder="Nombre completo" class="input-field">
                    <input type="email" id="email" placeholder="Email" class="input-field">
                    <input type="tel" id="phone" placeholder="Teléfono" class="input-field">
                    <input type="text" id="location" placeholder="Ciudad, País" class="input-field">
                    <input type="url" id="website" placeholder="Sitio web / LinkedIn" class="input-field">
                    <textarea id="summary" placeholder="Resumen profesional (2-3 líneas)" class="input-field" rows="4"></textarea>
                    <button type="button" class="btn-coach-help" onclick="getCoachTip('summary')">💡 Coach: Mejorar resumen</button>
                </div>

                <div id="experience" class="tab-content">
                    <h3>Experiencia Laboral</h3>
                    <div id="experienceList"></div>
                    <button type="button" class="btn-add" onclick="addExperience()">+ Agregar experiencia</button>
                </div>

                <div id="education" class="tab-content">
                    <h3>Educación</h3>
                    <div id="educationList"></div>
                    <button type="button" class="btn-add" onclick="addEducation()">+ Agregar educación</button>
                </div>

                <div id="skills" class="tab-content">
                    <h3>Habilidades</h3>
                    <textarea id="skillsInput" placeholder="Ingresa habilidades separadas por comas" class="input-field" rows="4"></textarea>
                    <button type="button" class="btn-coach-help" onclick="getCoachTip('skills')">💡 Coach: Optimizar habilidades ATS</button>
                </div>

                <div id="coach" class="tab-content">
                    <h3>🤖 AI Coach</h3>
                    <div id="coachPanel" class="coach-panel"></div>
                </div>
            </aside>

            <main class="preview-panel">
                <div class="preview-controls">
                    <button type="button" class="btn-primary" onclick="downloadPDF()">📥 Descargar PDF</button>
                    <button type="button" class="btn-primary" onclick="downloadDOCX()">📥 Descargar DOCX</button>
                    <button type="button" class="btn-secondary" onclick="printCV()">🖨️ Imprimir</button>
                </div>
                <div id="cvPreview" class="cv-preview"></div>
            </main>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.js"></script>

    <script>
        // ==================== AI COACH ====================
        const coachTips = {
            summary: [{
                title: "Resumen impactante",
                tips: [
                    "Empieza con un logro cuantificable",
                    "Usa palabras clave de tu industria",
                    "Mantén 2-3 líneas máximo",
                    "Incluye valor único que aportas"
                ],
                examples: [
                    "❌ Ingeniero con experiencia en software",
                    "✅ Ingeniero Full Stack con 5+ años. Lideré equipo de 8 devs"
                ]
            }],
            experience: [{
                title: "Experiencia ATS-Friendly",
                tips: [
                    "Usa verbos fuertes (Lideré, Desarrollé, Optimicé)",
                    "Incluye números y porcentajes",
                    "Evita jerga o acrónimos",
                    "Ordena por relevancia"
                ],
                examples: [
                    "❌ Trabajé en proyectos",
                    "✅ Desarrollé 3 módulos - reducción 35% en tiempo de carga"
                ]
            }],
            skills: [{
                title: "Habilidades optimizadas para ATS",
                tips: [
                    "Usa nombres estándar",
                    "Agrupa por categoría",
                    "Incluye herramientas específicas",
                    "Ordena por relevancia"
                ],
                examples: [
                    "TÉCNICAS: Python, JavaScript, React, SQL, AWS",
                    "SOFT SKILLS: Liderazgo, Comunicación"
                ]
            }]
        };

        function getCoachTip(section) {
            const tips = coachTips[section];
            if (!tips || tips.length === 0) return;

            const tip = tips[0];
            const coachPanel = document.getElementById('coachPanel');
            
            let html = `<div class="coach-tip"><h4>💡 ${tip.title}</h4><ul>`;
            tip.tips.forEach(t => { html += `<li>${t}</li>`; });
            html += `</ul>`;
            
            if (tip.examples) {
                html += `<div class="example"><strong>Ejemplos:</strong><br>`;
                tip.examples.forEach(ex => { html += `${ex}<br>`; });
                html += `</div>`;
            }
            
            html += `</div>`;
            coachPanel.innerHTML = html;
        }

        // ==================== CV GENERATOR ====================
        const cvData = {
            personal: {},
            experience: [],
            education: [],
            skills: []
        };

        function addExperience() {
            const id = Date.now();
            const html = `
                <div class="experience-item" data-id="${id}">
                    <input type="text" placeholder="Puesto" class="input-field exp-title" data-id="${id}">
                    <input type="text" placeholder="Empresa" class="input-field exp-company" data-id="${id}">
                    <input type="text" placeholder="Fecha inicio (ej: 2020)" class="input-field exp-start" data-id="${id}">
                    <input type="text" placeholder="Fecha fin (ej: 2023)" class="input-field exp-end" data-id="${id}">
                    <textarea placeholder="Descripción" class="input-field exp-description" data-id="${id}" rows="4"></textarea>
                    <button type="button" class="btn-coach-help" onclick="getCoachTip('experience')">💡 Optimizar</button>
                    <button type="button" onclick="removeExperience(${id})" style="background: #ef4444; color: white; width: 100%; margin-top: 10px; padding: 10px; border: none; border-radius: 6px; cursor: pointer;">✕ Eliminar</button>
                </div>
            `;
            document.getElementById('experienceList').insertAdjacentHTML('beforeend', html);
        }

        function removeExperience(id) {
            const element = document.querySelector(`.experience-item[data-id="${id}"]`);
            if (element) element.remove();
            renderCVPreview();
        }

        function addEducation() {
            const id = Date.now();
            const html = `
                <div class="education-item" data-id="${id}">
                    <input type="text" placeholder="Carrera/Certificado" class="input-field edu-title" data-id="${id}">
                    <input type="text" placeholder="Universidad/Institución" class="input-field edu-institution" data-id="${id}">
                    <input type="text" placeholder="Año de graduación" class="input-field edu-year" data-id="${id}">
                    <button type="button" onclick="removeEducation(${id})" style="background: #ef4444; color: white; width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer;">✕ Eliminar</button>
                </div>
            `;
            document.getElementById('educationList').insertAdjacentHTML('beforeend', html);
        }

        function removeEducation(id) {
            const element = document.querySelector(`.education-item[data-id="${id}"]`);
            if (element) element.remove();
            renderCVPreview();
        }

        function gatherCVData() {
            cvData.personal = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                location: document.getElementById('location').value,
                website: document.getElementById('website').value,
                summary: document.getElementById('summary').value
            };

            cvData.experience = [];
            document.querySelectorAll('.experience-item').forEach(item => {
                cvData.experience.push({
                    title: item.querySelector('.exp-title').value,
                    company: item.querySelector('.exp-company').value,
                    start: item.querySelector('.exp-start').value,
                    end: item.querySelector('.exp-end').value,
                    description: item.querySelector('.exp-description').value
                });
            });

            cvData.education = [];
            document.querySelectorAll('.education-item').forEach(item => {
                cvData.education.push({
                    title: item.querySelector('.edu-title').value,
                    institution: item.querySelector('.edu-institution').value,
                    year: item.querySelector('.edu-year').value
                });
            });

            cvData.skills = document.getElementById('skillsInput').value
                .split(',')
                .map(s => s.trim())
                .filter(s => s);
        }

        function renderCVPreview() {
            gatherCVData();
            
            let html = `
                <div class="cv-container">
                    <div class="cv-header">
                        <h1>${cvData.personal.fullName || 'Tu Nombre'}</h1>
                        <div class="cv-contact">
                            ${cvData.personal.email ? `<span>📧 ${cvData.personal.email}</span>` : ''}
                            ${cvData.personal.phone ? `<span>📱 ${cvData.personal.phone}</span>` : ''}
                            ${cvData.personal.location ? `<span>📍 ${cvData.personal.location}</span>` : ''}
                            ${cvData.personal.website ? `<span>🌐 ${cvData.personal.website}</span>` : ''}
                        </div>
                    </div>
            `;

            if (cvData.personal.summary) {
                html += `
                    <div class="cv-section">
                        <h3>PERFIL PROFESIONAL</h3>
                        <p>${cvData.personal.summary}</p>
                    </div>
                `;
            }

            if (cvData.experience.length > 0) {
                html += `<div class="cv-section"><h3>EXPERIENCIA LABORAL</h3>`;
                cvData.experience.forEach(exp => {
                    html += `
                        <div class="cv-item">
                            <div class="cv-title">
                                <strong>${exp.title}</strong>
                                <span class="cv-date">${exp.start} - ${exp.end}</span>
                            </div>
                            <div class="cv-company">${exp.company}</div>
                            <div class="cv-description">${exp.description}</div>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            if (cvData.education.length > 0) {
                html += `<div class="cv-section"><h3>EDUCACIÓN</h3>`;
                cvData.education.forEach(edu => {
                    html += `
                        <div class="cv-item">
                            <div class="cv-title">
                                <strong>${edu.title}</strong>
                                <span class="cv-date">${edu.year}</span>
                            </div>
                            <div class="cv-company">${edu.institution}</div>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            if (cvData.skills.length > 0) {
                html += `
                    <div class="cv-section">
                        <h3>HABILIDADES</h3>
                        <div class="skills-list">${cvData.skills.join(' • ')}</div>
                    </div>
                `;
            }

            html += `</div>`;
            document.getElementById('cvPreview').innerHTML = html;
        }

        // ==================== DESCARGAS ====================
        function downloadPDF() {
            const element = document.getElementById('cvPreview');
            const opt = {
                margin: 10,
                filename: 'CV_' + (cvData.personal.fullName || 'CV') + '.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };
            html2pdf().set(opt).from(element).save();
        }

        function downloadDOCX() {
            alert('Descarga DOCX - Feature en desarrollo. Por ahora usa PDF 📥');
        }

        function printCV() {
            window.print();
        }

        // ==================== TABS ====================
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const tabName = this.getAttribute('data-tab');
                
                document.querySelectorAll('.tab-content').forEach(tab => {
                    tab.classList.remove('active');
                });
                
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.classList.remove('active');
                });
                
                document.getElementById(tabName).classList.add('active');
                this.classList.add('active');
            });
        });

        // ==================== ACTUALIZACIÓN EN TIEMPO REAL ====================
        document.addEventListener('input', renderCVPreview);
        document.addEventListener('change', renderCVPreview);

        // Carga inicial
        renderCVPreview();
    </script>
</body>
</html>
